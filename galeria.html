<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="logo.png" type="image/png">
  <title>Galería</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body class="menu">

  <!-- Botón hamburguesa -->
  <button id="menuBtn">&#9776;</button>

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>Menú</h2>
    <ul>
      <li><a href="introduccion.html">Introducción</a></li>
      <li><a href="alfon.html">Alfon</a></li>
      <li><a href="galeria.html">Galería</a></li>
      <li><a href="peticiones.html">Peticiones</a></li>
    </ul>
  </div>

  <!-- Contenido -->
  <div class="contenido">
    <h1>Galería</h1>
    <p>Mira todos nuestros recuerdos juntos, TE QUIERO</p>

    <button id="imagenRandomBtn">Mostrar Imagen Aleatoria</button>
    <div id="imagenRandom" style="margin-top:20px; text-align:center;"></div>

    <h2>Collage de imágenes</h2>
    <div class="collage" id="collage"></div>
  </div>

  <!-- Importamos la lista de archivos -->
  <script src="archivos.js"></script>

  <script>
    // ---------------------------
    // Menú móvil
    // ---------------------------
    const menuBtn = document.getElementById('menuBtn');
    const sidebar = document.querySelector('.sidebar');

    menuBtn.addEventListener('click', () => {
      sidebar.classList.toggle('show');
    });

    // Cerrar menú al hacer click fuera en móvil
    document.addEventListener('click', e => {
      if (!sidebar.contains(e.target) && !menuBtn.contains(e.target)) {
        sidebar.classList.remove('show');
      }
    });
    

    // ---------------------------
    // Galería
    // ---------------------------
    const collage = document.getElementById('collage');
    const imagenRandomDiv = document.getElementById('imagenRandom');
    const botonRandom = document.getElementById('imagenRandomBtn');

    archivos.forEach(src => {
      const img = document.createElement('img');
      img.src = src;
      img.style.borderRadius = "15px";
      img.style.width = "100%";
      img.style.boxShadow = "0 5px 15px rgba(0,0,0,0.3)";
      collage.appendChild(img);
    });

    botonRandom.addEventListener('click', () => {
      const index = Math.floor(Math.random() * archivos.length);
      const src = archivos[index];
      imagenRandomDiv.innerHTML = `<img src="${src}" style="max-width:80%; border-radius:15px;">`;
    });
  </script>

  <!-- Estilos específicos para Galería -->
  <style>
    .collage {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .collage img {
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    button {
      padding: 10px 20px;
      border-radius: 15px;
      border: none;
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      color: white;
      cursor: pointer;
      font-size: 1em;
      transition: 0.3s;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    button:hover {
      background: linear-gradient(135deg, #0072ff, #00c6ff);
    }
  </style>

</body>
</html>
