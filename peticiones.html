<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="logo.png" type="image/png">
  <title>Peticiones</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body class="menu">

  <!-- Botón menú móvil -->
  <button id="menuBtn">&#9776;</button> 

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>Menú</h2>
    <ul>
      <li><a href="introduccion.html">Introducción</a></li>
      <li><a href="alfon.html">Alfon</a></li>
      <li><a href="galeria.html">Galería</a></li>
      <li><a href="peticiones.html">Peticiones</a></li>
    </ul>
  </div>

  <!-- Contenido -->
  <div class="contenido">
    <h1>Peticiones</h1>
    <p>Este es un espacio hecho especial y exclusivamente para usted. Deposita aquí cualquier petición que se te ocurra y Alfon la hará realidad.</p>

    <form id="formPeticiones">
      <input type="text" name="name" placeholder="Asunto" required>
      <textarea name="message" placeholder="Escribe tu petición..." required></textarea>
      <button type="submit">Enviar</button>
    </form>

    <p id="mensajeEnvio">
      ¡Mensaje enviado correctamente!
    </p>
  </div>

  <!-- Scripts -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Menú responsive
      const menuBtn = document.getElementById('menuBtn');
      const sidebar = document.querySelector('.sidebar');

      menuBtn.addEventListener('click', () => {
        sidebar.classList.toggle('show');
      });

      // Formulario AJAX
      const form = document.getElementById('formPeticiones');
      const mensaje = document.getElementById('mensajeEnvio');
      mensaje.style.display = 'none'; // aseguramos que esté oculto inicialmente

      form.addEventListener('submit', function(e) {
        e.preventDefault();

        const formData = new FormData(form);

        fetch('https://formspree.io/f/mvzbezle', {
          method: 'POST',
          body: formData,
          headers: { 'Accept': 'application/json' }
        })
        .then(response => {
          if (response.ok) {
            mensaje.style.display = 'block';
            form.reset();
            setTimeout(() => { mensaje.style.display = 'none'; }, 4000);
          } else {
            alert('Error al enviar, inténtalo de nuevo.');
          }
        })
        .catch(() => alert('Error al enviar, inténtalo de nuevo.'));
      });
    });
  </script>

</body>
</html>
