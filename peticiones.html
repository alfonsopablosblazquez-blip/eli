<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Peticiones </title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="menu">

  <!-- Menú lateral -->
  <div class="sidebar">
    <h2>Menú</h2>
    <ul>
      <li><a href="introduccion.html">Introducción</a></li>
      <li><a href="alfon.html">Alfon</a></li>
      <li><a href="galeria.html">Galería</a></li>
      <li><a href="peticiones.html">Peticiones</a></li>
    </ul>
  </div>

  <!-- Contenido -->
  <div class="contenido">
    <h1>Peticiones </h1>
    <p>Este es un espacio hecho especial y exclusivamente para usted. Deposita aquí cualquier petición que se te ocurra y Alfon la hará realidad</p>

    <form id="formPeticiones">
      <input type="text" name="name" placeholder="Asunto" required>
      <textarea name="message" placeholder="Escribe tu petición..." required></textarea>
      <button type="submit">Enviar</button>
    </form>

    <p id="mensajeEnvio" style="display:none; color: #00ffcc; margin-top: 10px; font-weight:bold;">
      ¡Mensaje enviado correctamente!
    </p>
  </div>

  <!-- JavaScript AJAX para Formspree -->
  <script>
    const form = document.getElementById('formPeticiones');
    const mensaje = document.getElementById('mensajeEnvio');

    form.addEventListener('submit', function(e) {
      e.preventDefault(); // evita recarga de página

      const formData = new FormData(form);

      fetch('https://formspree.io/f/mvzbezle', {  // <-- URL de Formspree
        method: 'POST',
        body: formData,
        headers: { 'Accept': 'application/json' }
      })
      .then(response => {
        if (response.ok) {
          mensaje.style.display = 'block';    // mostrar mensaje
          form.reset();                        // limpiar formulario
          setTimeout(() => { mensaje.style.display = 'none'; }, 4000); // desaparecer en 4s
        } else {
          alert('Error al enviar, intentalo de nuevo.');
        }
      })
      .catch(() => {
        alert('Error al enviar, intentalo de nuevo.');
      });
    });
  </script>

</body>
</html>
